name: Release Latest CLI

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config curl xz-utils tar

      - name: Build static audio dependencies
        run: ./scripts/bootstrap-static-audio-deps.sh
        env:
          JOBS: 2

      - name: Check FFmpeg nonfree is disabled
        run: grep -R "CONFIG_NONFREE 0" third_party/src/ffmpeg-*/config.h

      - name: Check FFmpeg IAMF is disabled
        run: |
          grep -R "CONFIG_IAMF 0" third_party/src/ffmpeg-*/config.h
          grep -R "CONFIG_IAMFDEC 0" third_party/src/ffmpeg-*/config.h

      - name: Build CLI
        run: |
          mkdir -p dist
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH="${{ matrix.goarch }}" \
          PKG_CONFIG_PATH="$PWD/third_party/ffmpeg-audio/lib/pkgconfig" \
          PKG_CONFIG="pkg-config --static" \
          go build -tags libav -trimpath -ldflags="-s -w -linkmode external -extldflags '-static'" -o dist/smartaudio ./cmd/smartaudio

      - name: Package CLI
        run: |
          artifact="smartaudio-linux-${{ matrix.arch }}.tar.gz"
          cp LICENSE THIRD_PARTY_NOTICES.md dist/
          tar -C dist -czf "$artifact" smartaudio LICENSE THIRD_PARTY_NOTICES.md
          sha256sum "$artifact" > "$artifact.sha256"
          mkdir -p upload
          mv "$artifact" "$artifact.sha256" upload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartaudio-linux-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: windows-2022
            msystem: UCRT64
            msys-package-prefix: mingw-w64-ucrt-x86_64
            cc: /ucrt64/bin/gcc
            pkg_config: /ucrt64/bin/pkg-config
            opus_configure_flags: ""
            ffmpeg_configure_flags: --arch=x86_64 --target-os=mingw32
          - arch: arm64
            goarch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            msys-package-prefix: mingw-w64-clang-aarch64
            cc: /clangarm64/bin/clang
            pkg_config: /clangarm64/bin/pkg-config
            opus_configure_flags: --disable-rtcd --disable-asm
            ffmpeg_configure_flags: --arch=aarch64 --target-os=mingw32
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          install: >-
            base-devel
            autoconf
            automake
            libtool
            make
            curl
            tar
            xz
            zip
            ${{ matrix.msys-package-prefix }}-pkgconf
            ${{ matrix.msys-package-prefix }}-toolchain

      - name: Build static audio dependencies
        run: |
          "$CC" -dumpmachine
          ./scripts/bootstrap-static-audio-deps.sh
        env:
          CC: ${{ matrix.cc }}
          PKG_CONFIG_BIN: ${{ matrix.pkg_config }}
          OPUS_CONFIGURE_FLAGS: ${{ matrix.opus_configure_flags }}
          FFMPEG_CONFIGURE_FLAGS: ${{ matrix.ffmpeg_configure_flags }}
          JOBS: 2

      - name: Check FFmpeg nonfree is disabled
        run: grep -R "CONFIG_NONFREE 0" third_party/src/ffmpeg-*/config.h

      - name: Check FFmpeg IAMF is disabled
        run: |
          grep -R "CONFIG_IAMF 0" third_party/src/ffmpeg-*/config.h
          grep -R "CONFIG_IAMFDEC 0" third_party/src/ffmpeg-*/config.h

      - name: Normalize Windows ARM64 pkg-config flags
        if: matrix.arch == 'arm64'
        run: sed -i 's/ -latomic//g' third_party/ffmpeg-audio/lib/pkgconfig/*.pc

      - name: Build CLI
        run: |
          mkdir -p dist
          CGO_ENABLED=1 \
          GOOS=windows \
          GOARCH="${{ matrix.goarch }}" \
          CC="${{ matrix.cc }}" \
          PKG_CONFIG_PATH="$PWD/third_party/ffmpeg-audio/lib/pkgconfig" \
          PKG_CONFIG="${{ matrix.pkg_config }} --static" \
          go build -tags libav -trimpath -ldflags="-s -w -linkmode external -extldflags '-static'" -o dist/smartaudio.exe ./cmd/smartaudio

      - name: Package CLI
        run: |
          artifact="smartaudio-windows-${{ matrix.arch }}.zip"
          cp LICENSE THIRD_PARTY_NOTICES.md dist/
          (cd dist && zip -9 "../$artifact" smartaudio.exe LICENSE THIRD_PARTY_NOTICES.md)
          sha256sum "$artifact" > "$artifact.sha256"
          mkdir -p upload
          mv "$artifact" "$artifact.sha256" upload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartaudio-windows-${{ matrix.arch }}
          path: upload/*
          if-no-files-found: error

  release:
    name: Publish Latest release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets

      - name: Move Latest tag
        run: |
          git tag -f Latest "$GITHUB_SHA"
          git push origin Latest --force

      - name: Delete previous Latest release
        run: gh release delete Latest --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Latest release
        run: |
          gh release create Latest release-assets/* \
            --title "Latest" \
            --notes "Automated CLI build for $GITHUB_SHA" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
